app:
  name: Tradam Scalping Bot
  environment: demo_learning
  display_timezone: Europe/Paris
  signal_scan_seconds: 5
  position_loop_seconds: 1
  reconciliation_seconds: 5
  heartbeat_seconds: 30

trading:
  # Connected execution is permanently restricted to MetaTrader 5 demo accounts.
  mode: demo_live
  allowed_modes:
    - demo_live
    - backtest
  enable_live_trading: false
  require_demo_account: true
  max_slippage_points: 30
  one_position_per_symbol_direction: true
  close_positions_on_shutdown: false
  max_simultaneous_positions: 3
  magic: 260707

mt5:
  initialize_timeout_seconds: 30
  login: null
  password: null
  server: null
  path: null
  portable: false
  # MT5 exposes tick epochs in UTC but not the terminal chart timezone.
  # Configure this explicitly for heartbeat display; never infer Europe/Paris.
  broker_utc_offset_minutes: 0

storage:
  database_path: data/trading_bot.sqlite

paths:
  data_dir: data
  logs_dir: logs
  reports_dir: reports

logging:
  level: INFO
  max_bytes: 5242880
  backup_count: 5

strategy:
  entry_timeframe: M1
  validation_timeframe: M5
  structure_timeframe: M15
  trend_timeframe: H1
  context_timeframe: H4
  history_bars:
    M1: 1200
    M5: 800
    M15: 500
    H1: 350
    H4: 250
  intrabar_prepared_setups: true
  max_prepared_setup_age_minutes: 5
  min_risk_reward: 0.8
  indicators:
    ema_trigger: 9
    ema_fast: 20
    ema_mid: 50
    ema_slow: 200
    rsi_period: 14
    atr_period: 14
    adx_period: 14
    bollinger_period: 20
    bollinger_std: 2
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    support_resistance_lookback: 60
    vwap_enabled: true
  filters:
    min_atr_to_price: 0.00008
    max_atr_to_price: 0.035
    min_bollinger_width_to_price: 0.00035
    avoid_range_enabled: true
    fibonacci_tolerance_atr: 0.30
    breakout_buffer_atr: 0.10
    pullback_ema_tolerance_atr: 0.25
    max_price_distance_from_ema20_atr: 1.20
    adx_hard_reject: 10
    adx_soft_penalty: 15
    adx_full_confirmation: 20
    adx_rising_bonus: 2.5
  setup_identity:
    source_candle_timeframe: M1
    default_expiry_minutes: 8
    require_structure_change_during_cooldown: true
  opening_range:
    duration_minutes: 15
    max_extension_atr: 0.75

news:
  enabled: true
  request_timeout_seconds: 8
  max_articles_per_symbol: 20
  max_data_age_minutes: 60
  high_impact_block_before_minutes: 30
  high_impact_block_after_minutes: 30
  dangerous_sentiment_threshold: -0.45
  positive_sentiment_threshold: 0.25
  negative_sentiment_threshold: -0.25
  block_when_macro_news_unavailable: true
  block_btc_when_news_unavailable: false
  block_audnzd_when_calendar_unavailable: true
  medium_impact_score_penalty: 0.5
  medium_impact_risk_multiplier: 0.75
