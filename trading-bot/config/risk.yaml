risk:
  max_session_loss_percent: 1.25
  max_daily_loss_percent: 2.0
  max_drawdown_percent: 5.0
  max_consecutive_losses_global: 4
  max_consecutive_losses_per_symbol: 2
  max_simultaneous_positions: 3
  max_correlated_positions_per_group: 1
  minimum_trades_per_session: 0
  allow_martingale: false
  allow_grid: false
  allow_loss_recovery: false
  increase_lot_after_loss: false
  require_stop_loss: true
  require_take_profit: true
  close_on_abnormal_conditions: true
  risk_multiplier_after_two_losses: 0.50
  score_penalty_after_two_losses: 0.50

position_sizing:
  volume_rounding: floor
  risk_tolerance_percent: 0.02
  require_order_calc_profit: true
  require_order_calc_margin: true
  # Values below are reserved for offline backtests and are forbidden in demo_live.
  backtest_tick_value: 1.0
  backtest_tick_size: 0.01
  backtest_volume_min: 0.01
  backtest_volume_max: 1.0
  backtest_volume_step: 0.01

execution:
  max_slippage_points: 30
  validate_symbol_tradable: true
  validate_market_open: true
  validate_margin: true
  validate_stop_distance: true
  reject_if_spread_above_symbol_limit: true
  require_account_trading_allowed: true
  require_order_check: true
  max_spread_cost_ratio: 0.25
  minimum_net_profit: 0.50

position_management:
  trailing_stop_enabled: true
  trailing_method: swing_or_ema9
  trailing_atr_multiplier: 0.60
  break_even_enabled: true
  break_even_cost_buffer_points: 2
  max_sl_modify_attempts: 2
  action_confirmation_ticks: 2
  close_before_session_end: true

underlying_group_limits:
  nasdaq_group: {max_positions: 1, max_risk_percent: 0.35}
  dow_group: {max_positions: 1, max_risk_percent: 0.35}
  gold_group: {max_positions: 1, max_risk_percent: 0.25}
  crypto_group: {max_positions: 1, max_risk_percent: 0.25}
  forex_group: {max_positions: 1, max_risk_percent: 0.30}
