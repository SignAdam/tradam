app:
  name: Tradam Scalping Bot
  environment: learning
  timezone: Europe/Paris
  loop_seconds: 20

trading:
  # Allowed modes: backtest, paper, demo_live, live.
  # Never use live as the default.
  mode: paper
  enable_live_trading: false
  live_trading_confirmation: false
  require_demo_account: true
  paper_fill_model: conservative
  max_slippage_points: 30
  one_position_per_symbol_direction: true
  close_positions_on_shutdown: false

mt5:
  initialize_timeout_seconds: 30
  login: null
  password: null
  server: null
  path: null
  portable: false

storage:
  database_path: data/trading_bot.sqlite

paths:
  data_dir: data
  logs_dir: logs
  reports_dir: reports

logging:
  level: INFO
  max_bytes: 5242880
  backup_count: 5

strategy:
  entry_timeframe: M5
  confirmation_timeframe: M15
  trend_timeframe: H1
  context_timeframe: H4
  history_bars:
    M1: 800
    M5: 600
    M15: 400
    H1: 300
    H4: 200
  score_threshold: 7
  min_risk_reward: 1.4
  max_open_positions_per_symbol: 1
  indicators:
    ema_fast: 20
    ema_mid: 50
    ema_slow: 200
    rsi_period: 14
    atr_period: 14
    adx_period: 14
    bollinger_period: 20
    bollinger_std: 2
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    support_resistance_lookback: 60
    vwap_enabled: true
  filters:
    min_adx: 18
    min_atr_to_price: 0.00015
    max_atr_to_price: 0.025
    min_bollinger_width_to_price: 0.0008
    avoid_range_enabled: true
    fibonacci_tolerance_atr: 0.35
    breakout_buffer_atr: 0.15
    pullback_ema_tolerance_atr: 0.30
  exits:
    atr_stop_multiplier: 1.2
    atr_take_profit_multiplier: 1.8
    trailing_stop_enabled: true
    trailing_atr_multiplier: 1.0
    break_even_enabled: true
    break_even_after_r: 0.8

news:
  enabled: true
  request_timeout_seconds: 8
  max_articles_per_symbol: 20
  high_impact_block_before_minutes: 30
  high_impact_block_after_minutes: 30
  dangerous_sentiment_threshold: -0.45
  positive_sentiment_threshold: 0.25
  negative_sentiment_threshold: -0.25
  fallback_when_apis_missing: neutral

